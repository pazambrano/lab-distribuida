<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Tareas - Nube</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .contenedor { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
        button { padding: 10px 15px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        pre { background: #e9ecef; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Gestión de Tareas (Despliegue Serverless)</h1>
    <div class="contenedor">
        <input id="titulo" placeholder="Título de la tarea">
        <input id="descripcion" placeholder="Descripción detallada">
        <button onclick="crearTarea()">Crear Tarea</button>
        <button onclick="cargarTareas()">Listar Tareas</button>
    </div>
    <h2>Respuesta Serverless:</h2>
    <div id="resultado"></div>

    <script>
        const API_URL = "/api/tareas"; 

        async function cargarTareas() {
            const res = await fetch(API_URL);
            const tareas = await res.json();
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(tareas, null, 2) + '</pre>';
        }

        async function crearTarea() {
            const titulo = document.getElementById('titulo').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();

            if(!titulo || !descripcion) return alert("Completa los campos.");

            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulo, descripcion, completada: false })
            });
            const data = await res.json();
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
    </script>
</body>
</html>
